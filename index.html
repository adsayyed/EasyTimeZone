    <style>
      /* Use Montserrat Alternates from Google Fonts */
      @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;700&display=swap');
      :where([class^="ri-"])::before { content: "\f3c2"; }
      input[type="text"]::-webkit-calendar-picker-indicator { display: none; }
      html, body, * { font-family: system-ui, sans-serif !important; font-weight: 400; }
      h1 { font-weight: 700; }
      .text-xl, .text-2xl, .text-3xl { font-weight: 500; }
      #timezone-list, #theme-list, #font-list {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      #timezone-list::-webkit-scrollbar, #theme-list::-webkit-scrollbar, #font-list::-webkit-scrollbar {
        display: none;
      }
      .drag-handle, .remove-btn {
        display: none;
        cursor: pointer;
      }
      .drag-handle {
        position: absolute;
        bottom: 4px;
        right: 4px;
        color: #A1A1AA;
      }
      .remove-btn {
        color: #EF4444;
        font-size: 1rem;
        line-height: 1;
        margin-left: 0.5rem;
      }
      .time-zone-box:hover .drag-handle,
      .time-zone-box:hover .remove-btn {
        display: block;
      }
      /* Ensure theme option text matches font option color in light mode */
      #theme-popup.bg-white .theme-option span {
        color: #d1d5db !important;
      }
      .time-zone-box {
        position: relative;
      }
      .timezone-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.5rem;
      }
      .time-input-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 2px;
      }
      .time-input {
        width: 60px;
        text-align: center;
        background: transparent;
        border: none;
        font-size: 1.5rem;
        font-weight: 500;
        color: inherit;
        padding: 4px;
        border-radius: 4px;
      }
      .ampm-container {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .ampm-btn {
        padding: 2px 4px;
        border-radius: 4px;
        background: transparent;
        color: inherit;
        border: none;
        cursor: pointer;
        font-size: 0.875rem;
      }
      .ampm-btn.selected {
        background: rgba(255, 255, 255, 0.2);
      }
      .time-input:focus {
        outline: none;
        background: rgba(255, 255, 255, 0.1);
      }
      .time-input::placeholder {
        color: #A1A1AA;
      }
      @media (max-width: 640px) {
        #timezone-list, #theme-list {
          max-height: 144px;
        }
        #timezone-popup {
          top: 60px;
          left: 50%;
          transform: translateX(-50%);
          z-index: 10;
        }
        #theme-popup {
          bottom: 60px;
          right: 50%;
          transform: translateX(50%);
          z-index: 10;
        }
      }
    .font-option {
  background: none;
  color: #d1d5db;
}
.font-option.selected {
  background: #374151;
  color: #fff;
}
.font-option:hover {
  background: #374151;
  color: #fff;
}

</style>

            theme: themes[currentThemeIndex].name,
            liveTimeEnabled: !!liveTimeInterval,
          };
          // Use consistent key
          localStorage.setItem("timeZonePrefs", JSON.stringify(preferences));
        };

        const attachDragAndTouchListeners = (box) => {
          box.addEventListener("dragstart", (e) => {
            box.classList.add("dragging");
            e.dataTransfer.setData("text/plain", box.id);
          });
          box.addEventListener("dragend", () => {
            box.classList.remove("dragging");
            savePreferences();
          });
          box.addEventListener("dragover", (e) => {
            e.preventDefault();
          });
          box.addEventListener("drop", (e) => {
            e.preventDefault();
            const draggedId = e.dataTransfer.getData("text/plain");
            const draggedBox = document.getElementById(draggedId);
            const dropTarget = e.target.closest(".time-zone-box");
            if (draggedBox && dropTarget && draggedBox !== dropTarget) {
              const allBoxes = Array.from(timezoneContainer.querySelectorAll(".time-zone-box"));
              const draggedIndex = allBoxes.indexOf(draggedBox);
              const targetIndex = allBoxes.indexOf(dropTarget);
              if (draggedIndex < targetIndex) {
                timezoneContainer.insertBefore(draggedBox, dropTarget.nextSibling);
              } else {
                timezoneContainer.insertBefore(draggedBox, dropTarget);
              }
              savePreferences();
            }
          });
          let touchStartY = 0;
          let touchStartX = 0;
          box.addEventListener("touchstart", (e) => {
            const touch = e.touches[0];
            touchStartY = touch.clientY;
            touchStartX = touch.clientX;
            box.classList.add("dragging");
            box.setAttribute("data-id", box.id);
          });
          box.addEventListener("touchmove", (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const touchY = touch.clientY;
            const touchX = touch.clientX;
            box.style.position = "relative";
            box.style.top = `${touchY - touchStartY}px`;
            box.style.left = `${touchX - touchStartX}px`;
          });
          box.addEventListener("touchend", (e) => {
            box.classList.remove("dragging");
            box.style.position = "";
            box.style.top = "";
            box.style.left = "";
            const touch = e.changedTouches[0];
            const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
            const dropBox = dropTarget.closest(".time-zone-box");
            const draggedId = box.getAttribute("data-id");
            const draggedBox = document.getElementById(draggedId);
            if (draggedBox && dropBox && draggedBox !== dropBox) {
              const allBoxes = Array.from(timezoneContainer.querySelectorAll(".time-zone-box"));
              const draggedIndex = allBoxes.indexOf(draggedBox);
              const targetIndex = allBoxes.indexOf(dropBox);
              if (draggedIndex < targetIndex) {
                timezoneContainer.insertBefore(draggedBox, dropBox.nextSibling);
              } else {
                timezoneContainer.insertBefore(draggedBox, dropBox);
              }
              savePreferences();
            }
          });
        };

        const attachAddTimezoneListeners = () => {
          const addTimezoneBtnEl = document.getElementById("add-timezone-btn");
          const timezonePopupEl = document.getElementById("timezone-popup");
          const timezoneSearchEl = document.getElementById("timezone-search");
          const timezoneListEl = document.getElementById("timezone-list");

          if (!addTimezoneBtnEl || !timezonePopupEl || !timezoneSearchEl || !timezoneListEl) {
            console.error("One or more DOM elements not found for timezone addition");
            return;
          }

          addTimezoneBtnEl.addEventListener("click", (e) => {
            e.stopPropagation();
            console.log("Add timezone button clicked");
            timezonePopupEl.classList.toggle("hidden");
            if (!timezonePopupEl.classList.contains("hidden")) {
              renderTimezoneList();
              timezoneSearchEl.focus();
            }
          });

          timezoneSearchEl.addEventListener("input", (e) => {
            renderTimezoneList(e.target.value);
          });

          document.addEventListener("click", (e) => {
            if (!timezonePopupEl.contains(e.target) && e.target !== addTimezoneBtnEl) {
              timezonePopupEl.classList.add("hidden");
            }
          });

          timezoneListEl.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            const timezoneOption = e.target.closest(".timezone-option");
            if (!timezoneOption) return;
            try {
              const selectedTimezone = timezoneOption.dataset.timezone;
              const selectedOffset = parseFloat(timezoneOption.dataset.offset);
              if (!selectedTimezone || isNaN(selectedOffset)) {
                throw new Error("Invalid timezone or offset");
              }
              const selectedTz = timezones.find(tz => tz.name === selectedTimezone);
              if (!selectedTz) {
                throw new Error("Timezone not found");
              }
              const selectedShorthand = selectedTz.shorthand;
              const existingBoxes = timezoneContainer.querySelectorAll(".time-zone-box");
              if (existingBoxes.length >= 5) {
                errorMessage.textContent = "Maximum of 5 time zones reached";
                errorMessage.classList.remove("hidden");
                setTimeout(() => {
                  errorMessage.classList.add("hidden");
                  errorMessage.textContent = "Please enter a valid time";
                }, 3000);
                timezonePopupEl.classList.add("hidden");
                return;
              }
              const newBoxId = `tz-box-${Date.now()}`;
              const newBox = document.createElement("div");
              newBox.className = "time-zone-box w-4/5 max-w-xs sm:flex-1 bg-gray-800 rounded-lg p-4 cursor-pointer hover:bg-[#323232] transition-colors mx-auto";
              newBox.id = newBoxId;
              newBox.setAttribute("draggable", "true");
              newBox.dataset.timezone = selectedTimezone;
              newBox.dataset.offset = selectedOffset;
              const offsetDisplay = selectedOffset >= 0 ? `+${selectedOffset}` : selectedOffset;
              newBox.innerHTML = `
                <div class="timezone-header">
                  <div class="text-xl flex items-center gap-2">
                    <span>${selectedShorthand}</span>
                    <span class="text-sm text-gray-400">${offsetDisplay}</span>
                  </div>
                  <button class="remove-btn" title="Remove Timezone">✕</button>
                </div>
                <div class="time-input-container hidden" id="${newBoxId}-input">
                  <input type="text" class="time-input hours" maxlength="2" placeholder="HH" />
                  <span>:</span>
                  <input type="text" class="time-input minutes" maxlength="2" placeholder="MM" />
                  <div class="ampm-container">
                    <button class="ampm-btn" data-period="AM">AM</button>
                    <button class="ampm-btn" data-period="PM">PM</button>
                  </div>
                </div>
                <div class="time-display text-2xl font-medium text-center" id="${newBoxId}-time">--:--</div>
                <i class="drag-handle ri-drag-move-2-line w-5 h-5 text-gray-400"></i>
              `;
              timezoneContainer.insertBefore(newBox, addTimezoneWrapper);
              const newInput = document.getElementById(`${newBoxId}-input`);
              const newDisplay = document.getElementById(`${newBoxId}-time`);
              setupTimeBox(newBox, newInput, newDisplay);
              updateTimes(cstInput);
              const removeBtn = newBox.querySelector(".remove-btn");
              removeBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                newBox.remove();
                updateTimes(cstInput);
                savePreferences();
                highlightUserTimeZone();
              });
              const currentTheme = themes[currentThemeIndex];
              if (currentTheme.name === "light") {
                applyLightMode(currentTheme);
              } else {
                applyDarkMode(currentTheme);
              }
              attachDragAndTouchListeners(newBox);
              timezonePopupEl.classList.add("hidden");
              savePreferences();
              highlightUserTimeZone();
            } catch (error) {
              console.error("Error adding timezone:", error);
              errorMessage.textContent = "Failed to add timezone";
              errorMessage.classList.remove("hidden");
              setTimeout(() => {
                errorMessage.classList.add("hidden");
                errorMessage.textContent = "Please enter a valid time";
              }, 3000);
            }
          });
        };

        // Load preferences including color for each timezone box
        const loadPreferences = () => {
          const savedPrefs = localStorage.getItem("timeZonePrefs");
          if (!savedPrefs) return false;
          const preferences = JSON.parse(savedPrefs);
          const addTimezoneWrapperHTML = addTimezoneWrapper.outerHTML;
          timezoneContainer.innerHTML = '';
          // Restore boxes in the exact order saved (including custom boxes and order)
          (preferences.timezones || []).forEach(tzData => {
            const selectedTz = timezones.find(tz => tz.name === tzData.timezone);
            const selectedShorthand = selectedTz ? selectedTz.shorthand : tzData.timezone;
            const offsetDisplay = tzData.offset >= 0 ? `+${tzData.offset}` : tzData.offset;
            const newBox = document.createElement("div");
            newBox.className = "time-zone-box w-4/5 max-w-xs sm:flex-1 bg-gray-800 rounded-lg p-4 cursor-pointer hover:bg-[#323232] transition-colors mx-auto";
            newBox.id = tzData.id;
            newBox.setAttribute("draggable", "true");
            newBox.dataset.timezone = tzData.timezone;
            newBox.dataset.offset = tzData.offset;
            if (tzData.color) {
              newBox.style.backgroundColor = tzData.color;
            }
            newBox.innerHTML = `
              <div class="timezone-header">
                <div class="text-xl flex items-center gap-2">
                  <span>${selectedShorthand}</span>
                  <span class="text-sm text-gray-400">${offsetDisplay}</span>
                </div>
                <button class="remove-btn" title="Remove Timezone">✕</button>
              </div>
              <div class="time-input-container hidden" id="${tzData.id}-input">
                <input type="text" class="time-input hours" maxlength="2" placeholder="HH" />
                <span>:</span>
                <input type="text" class="time-input minutes" maxlength="2" placeholder="MM" />
                <div class="ampm-container">
                  <button class="ampm-btn" data-period="AM">AM</button>
                  <button class="ampm-btn" data-period="PM">PM</button>
                </div>
              </div>
              <div class="time-display text-2xl font-medium text-center" id="${tzData.id}-time">--:--</div>
              <i class="drag-handle ri-drag-move-2-line w-5 h-5 text-gray-400"></i>
            `;
            timezoneContainer.appendChild(newBox);
            const newInput = document.getElementById(`${tzData.id}-input`);
            const newDisplay = document.getElementById(`${tzData.id}-time`);
            setupTimeBox(newBox, newInput, newDisplay);
            if (tzData.id === "pst-box") {
              pstInput = newInput;
              pstTime.textContent = newDisplay.textContent;
            }
            if (tzData.id === "cst-box") {
              cstInput = newInput;
              cstTime.textContent = newDisplay.textContent;
            }
            if (tzData.id === "est-box") {
              estInput = newInput;
              estTime.textContent = newDisplay.textContent;
            }
            const removeBtn = newBox.querySelector(".remove-btn");
            if (removeBtn) {
              removeBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                newBox.remove();
                updateTimes(cstInput);
                savePreferences();
                highlightUserTimeZone();
              });
            }
            attachDragAndTouchListeners(newBox);
          });
          const tempDiv = document.createElement("div");
          tempDiv.innerHTML = addTimezoneWrapperHTML;
          const newAddTimezoneWrapper = tempDiv.firstChild;
          timezoneContainer.appendChild(newAddTimezoneWrapper);
          attachAddTimezoneListeners();
          const addTimezoneBtnEl = document.getElementById("add-timezone-btn");
          addTimezoneBtnEl.addEventListener("click", (e) => {
            e.stopPropagation();
            console.log("Add timezone button clicked");
            const timezonePopupEl = document.getElementById("timezone-popup");
            timezonePopupEl.classList.toggle("hidden");
            if (!timezonePopupEl.classList.contains("hidden")) {
              renderTimezoneList();
              const timezoneSearchEl = document.getElementById("timezone-search");
              timezoneSearchEl.focus();
            }
          });
          if (preferences.theme) {
            const theme = themes.find(t => t.name === preferences.theme);
            if (theme) {
              currentThemeIndex = themes.indexOf(theme);
              if (preferences.theme === "light") {
                applyLightMode(theme);
              } else {
                applyDarkMode(theme);
              }
            }
          }
          if (preferences.liveTimeEnabled) {
            toggleLiveTime();
          }
          const now = new Date();
          const currentHours = now.getHours();
          const currentMinutes = now.getMinutes();
          const period = currentHours >= 12 ? "PM" : "AM";
          const displayHours = currentHours % 12 || 12;
          cstInput.querySelector(".hours").value = displayHours.toString().padStart(2, "0");
          cstInput.querySelector(".minutes").value = currentMinutes.toString().padStart(2, "0");
          cstInput.querySelector(`.ampm-btn[data-period='${period}']`).classList.add("selected");
          updateTimes(cstInput);
          return true;
        };

        const renderTimezoneList = (searchTerm = "") => {
          const filter = searchTerm.trim().toLowerCase();
          const filteredTimezones = filter === ""
            ? timezones
            : timezones.filter((tz) =>
                tz.name.toLowerCase().includes(filter) ||
                tz.shorthand.toLowerCase().includes(filter)
              );
          const currentTheme = themes[currentThemeIndex];
          const isLightTheme = currentTheme.name === "light";
          timezoneListEl.innerHTML = filteredTimezones
            .map(
              (tz) => `
                <button class="timezone-option flex items-center gap-2 w-full p-2 rounded hover:bg-${
                  isLightTheme ? "gray-200" : "gray-700"
                } transition-colors text-left" data-timezone="${tz.name}" data-offset="${tz.offset}">
                  <i class="ri-time-line w-4 h-4 flex items-center justify-center text-${
                    isLightTheme ? "gray-600" : "gray-400"
                  }"></i>
                  <span class="text-sm text-${
                    isLightTheme ? "gray-700" : "gray-300"
                  }">${tz.shorthand} (${tz.name})</span>
                </button>
              `,
            )
            .join("");
        };

        const getUserTimeZoneBox = () => {
          const userTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
          const timeZoneMapping = {
            "America/New_York": "est-box",
            "America/Chicago": "cst-box",
            "America/Los_Angeles": "pst-box",
            "America/Detroit": "est-box",
            "America/Toronto": "est-box",
            "America/Denver": "cst-box",
            "America/Phoenix": "pst-box",
          };
          for (const [tz, boxId] of Object.entries(timeZoneMapping)) {
            if (userTimeZone.includes(tz.split('/')[1])) {
              return document.getElementById(boxId);
            }
          }
          return document.getElementById("cst-box");
        };

        const highlightUserTimeZone = () => {
          const userBox = getUserTimeZoneBox();
          if (userBox) {
            const allBoxes = timezoneContainer.querySelectorAll(".time-zone-box");
            allBoxes.forEach(box => {
              box.classList.remove("border-2", "border-blue-500", "border-red-500", "border-[#E2B714]", "border-[#FF79C6]", "border-[#81A1C1]", "border-[#2AA198]", "border-[#FABD2F]", "border-[#F92672]");
            });
            userBox.classList.add("border-2", "border-primary");
          }
        };

        const setupTimeBox = (box, inputContainer, display) => {
          const hoursInput = inputContainer.querySelector(".hours");
          const minutesInput = inputContainer.querySelector(".minutes");
          const ampmButtons = inputContainer.querySelectorAll(".ampm-btn");

          box.addEventListener("click", (e) => {
            e.stopPropagation();
            if (liveTimeInterval || e.target.classList.contains("remove-btn")) return;
            const allInputContainers = timezoneContainer.querySelectorAll(".time-input-container");
            const allDisplays = timezoneContainer.querySelectorAll(".time-display");
            const allBoxes = timezoneContainer.querySelectorAll(".time-zone-box");
            allInputContainers.forEach((inp) => inp.classList.add("hidden"));
            allDisplays.forEach((disp) => disp.classList.remove("hidden"));
            allBoxes.forEach((b) => b.classList.remove("border-2", "border-primary"));
            inputContainer.classList.remove("hidden");
            display.classList.add("hidden");
            box.classList.add("border-2", "border-primary");
            hoursInput.value = "";
            minutesInput.value = "";
            ampmButtons.forEach(btn => {
              if (btn.dataset.period === "AM") {
                btn.classList.add("selected");
              } else {
                btn.classList.remove("selected");
              }
            });
            hoursInput.focus();
            activeInput = inputContainer;
          });

          hoursInput.addEventListener("input", (e) => {
            let value = e.target.value.replace(/[^0-9]/g, '');
            if (value.length > 2) {
              value = value.slice(0, 2);
            }
            e.target.value = value;
            if (value.length === 2) {
              let num = parseInt(value);
              if (num < 1 || num > 12) {
                e.target.value = value.slice(0, 1);
                return;
              }
              e.target.value = num.toString().padStart(2, "0");
              minutesInput.value = "";
              minutesInput.focus();
            }
          });

          minutesInput.addEventListener("input", (e) => {
            let value = e.target.value.replace(/[^0-9]/g, '');
            if (value.length > 2) {
              value = value.slice(0, 2);
            }
            e.target.value = value;
            if (value.length === 2) {
              let num = parseInt(value);
              if (num > 59) {
                e.target.value = value.slice(0, 1);
                return;
              }
              e.target.value = num.toString().padStart(2, "0");
            }
          });

          ampmButtons.forEach(btn => {
            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              ampmButtons.forEach(b => b.classList.remove("selected"));
              btn.classList.add("selected");
              if (hoursInput.value && minutesInput.value) {
                updateTimes(inputContainer);
                inputContainer.classList.add("hidden");
                display.classList.remove("hidden");
                box.classList.remove("border-2", "border-primary");
                activeInput = null;
                highlightUserTimeZone();
              }
            });
          });

          [hoursInput, minutesInput].forEach((input, index) => {
            input.addEventListener("click", (e) => {
              e.stopPropagation();
              input.value = "";
              input.focus();
            });

            input.addEventListener("keydown", (e) => {
              if ((e.key === "Enter" || e.key === "ArrowRight") && input.value.length === 2) {
                e.preventDefault();
                if (index === 0) {
                  let num = parseInt(input.value);
                  if (num >= 1 && num <= 12) {
                    minutesInput.value = "";
                    minutesInput.focus();
                  }
                } else if (index === 1) {
                  let num = parseInt(input.value);
                  if (num <= 59) {
                    // AM/PM selection handled by buttons
                  }
                }
              } else if (e.key === "ArrowLeft" && index > 0) {
                e.preventDefault();
                hoursInput.value = "";
                hoursInput.focus();
              } else if ((e.key === 'a' || e.key === 'A') && ampmButtons.length) {
                e.preventDefault();
                ampmButtons.forEach(b => b.classList.remove('selected'));
                const amBtn = Array.from(ampmButtons).find(b => b.dataset.period === 'AM');
                if (amBtn) amBtn.classList.add('selected');
                if (hoursInput.value && minutesInput.value) {
                  updateTimes(inputContainer);
                  inputContainer.classList.add('hidden');
                  display.classList.remove('hidden');
                  box.classList.remove('border-2', 'border-primary');
                  activeInput = null;
                  highlightUserTimeZone();
                }
              } else if ((e.key === 'p' || e.key === 'P') && ampmButtons.length) {
                e.preventDefault();
                ampmButtons.forEach(b => b.classList.remove('selected'));
                const pmBtn = Array.from(ampmButtons).find(b => b.dataset.period === 'PM');
                if (pmBtn) pmBtn.classList.add('selected');
                if (hoursInput.value && minutesInput.value) {
                  updateTimes(inputContainer);
                  inputContainer.classList.add('hidden');
                  display.classList.remove('hidden');
                  box.classList.remove('border-2', 'border-primary');
                  activeInput = null;
                  highlightUserTimeZone();
                }
              } else if (!/[0-9]/.test(e.key) && e.key !== "Backspace" && e.key !== "Tab" && e.key !== "ArrowLeft" && e.key !== "ArrowRight" && e.key !== "Enter") {
                e.preventDefault();
              }
            });
          });
        };
        setupTimeBox(pstBox, pstInput, pstTime);
        setupTimeBox(cstBox, cstInput, cstTime);
        setupTimeBox(estBox, estInput, estTime);

        document.addEventListener("click", (e) => {
          if (!e.target.closest(".time-zone-box") && activeInput) {
            const allInputContainers = timezoneContainer.querySelectorAll(".time-input-container");
            const allDisplays = timezoneContainer.querySelectorAll(".time-display");
            const allBoxes = timezoneContainer.querySelectorAll(".time-zone-box");
            allInputContainers.forEach((inp) => inp.classList.add("hidden"));
            allDisplays.forEach((disp) => disp.classList.remove("hidden"));
            allBoxes.forEach((b) => b.classList.remove("border-2", "border-primary"));
            activeInput = null;
            highlightUserTimeZone();
          }
        });

        const updateTimes = (sourceInput) => {
          const hours = sourceInput.querySelector(".hours").value;
          const minutes = sourceInput.querySelector(".minutes").value;
          const selectedPeriodBtn = sourceInput.querySelector(".ampm-btn.selected");
          const period = selectedPeriodBtn ? selectedPeriodBtn.dataset.period : null;
          if (!hours || !minutes || !period || !/^\d{2}$/.test(hours) || !/^\d{2}$/.test(minutes)) {
            const allDisplays = timezoneContainer.querySelectorAll(".time-display");
            allDisplays.forEach((disp) => (disp.textContent = "--:--"));
            errorMessage.classList.remove("hidden");
            return;
          }
          try {
            let hoursNum = parseInt(hours);
            const minutesNum = parseInt(minutes);
            if (hoursNum < 1 || hoursNum > 12 || minutesNum > 59) {
              throw new Error("Invalid time");
            }
            if (period === "PM" && hoursNum !== 12) hoursNum += 12;
            if (period === "AM" && hoursNum === 12) hoursNum = 0;
            const sourceBox = sourceInput.closest(".time-zone-box");
            const sourceOffset = parseFloat(sourceBox.dataset.offset);
            const baseHours = (hoursNum - sourceOffset + 24) % 24;
            const formatTime = (hours, minutes) => {
              const period = hours >= 12 ? "PM" : "AM";
              let displayHours = hours % 12;
              if (displayHours === 0) displayHours = 12;
              return `${displayHours.toString().padStart(2, "0")}:${minutes.toString().padStart(2, "0")} ${period}`;
            };
            const allBoxes = timezoneContainer.querySelectorAll(".time-zone-box");
            allBoxes.forEach((box) => {
              const offset = parseFloat(box.dataset.offset);
              let adjustedHours = (baseHours + offset + 24) % 24;
              const display = box.querySelector(".time-display");
              display.textContent = formatTime(adjustedHours, minutesNum);
            });
            errorMessage.classList.add("hidden");
          } catch (e) {
            const allDisplays = timezoneContainer.querySelectorAll(".time-display");
            allDisplays.forEach((disp) => (disp.textContent = "--:--"));
            errorMessage.classList.remove("hidden");
          }
        };

        [pstInput, cstInput, estInput].forEach((input) => {
          input.querySelectorAll(".time-input").forEach((field) => {
            field.addEventListener("input", () => updateTimes(input));
            field.addEventListener("change", () => updateTimes(input));
          });
          input.querySelectorAll(".ampm-btn").forEach((btn) => {
            btn.addEventListener("click", () => updateTimes(input));
          });
        });

        const themes = [
          { name: "light", bgColor: "#F5F5F5", textColor: "#333333", primary: "#3B82F6", secondary: "#2563EB", livePrimary: "#3B82F6", liveSecondary: "#2563EB", borderColor: "border-blue-500" },
          { name: "dark", bgColor: "#000000", textColor: "#FFFFFF", primary: "#E2B714", secondary: "#D4A017", livePrimary: "#EF4444", liveSecondary: "#DC2626", borderColor: "border-red-500" },
          { name: "serika-dark", primary: "#E2B714", secondary: "#D4A017", bgColor: "#323232", textColor: "#D1D0C5", livePrimary: "#E2B714", liveSecondary: "#D4A017", borderColor: "border-[#E2B714]" },
          { name: "dracula", primary: "#FF79C6", secondary: "#BD93F9", bgColor: "#282A36", textColor: "#F8F8F2", livePrimary: "#FF79C6", liveSecondary: "#BD93F9", borderColor: "border-[#FF79C6]" },
          { name: "nord", primary: "#81A1C1", secondary: "#88C0D0", bgColor: "#2E3440", textColor: "#D8DEE9", livePrimary: "#81A1C1", liveSecondary: "#88C0D0", borderColor: "border-[#81A1C1]" },
          { name: "solarized-dark", primary: "#2AA198", secondary: "#268BD2", bgColor: "#002B36", textColor: "#839496", livePrimary: "#2AA198", liveSecondary: "#268BD2", borderColor: "border-[#2AA198]" },

          if (!font.import) return;
          if (document.querySelector(`link[data-font='${font.label}']`)) return;
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = font.import;
          link.setAttribute('data-font', font.label);
          document.head.appendChild(link);
        }

    btn.className = `theme-option flex items-center gap-2 w-full p-2 rounded hover:bg-gray-700 transition-colors`;
    if (isLight) {
      btn.classList.remove('hover:bg-gray-700');
      btn.classList.add('hover:bg-gray-100');

          const font = availableFonts.find(f => f.label === fontLabel);
          if (!font) return;
          ensureFontLoaded(font);
          document.documentElement.style.setProperty('font-family', font.css);
          document.body.style.setProperty('font-family', font.css);
          // Also update global CSS rule
          let styleEl = document.getElementById('dynamic-font-style');
          if (!styleEl) {
            styleEl = document.createElement('style');
            styleEl.id = 'dynamic-font-style';
            document.head.appendChild(styleEl);
          }
          styleEl.innerHTML = `html, body, * { font-family: ${font.css} !important; }`;
          localStorage.setItem('selectedFont', fontLabel);
        }
